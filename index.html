<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synesthesia Experience</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body { background:#06060f; overflow:hidden; cursor:crosshair; }

    #canvas { position:fixed; top:0; left:0; width:100%; height:100%; }

    .instructions {
      position:fixed; top:28px; left:50%; transform:translateX(-50%);
      text-align:center; color:rgba(255,255,255,0.38);
      font-family:'Courier New',monospace; font-size:11px;
      letter-spacing:0.2em; text-transform:uppercase;
      z-index:100; white-space:nowrap; pointer-events:none;
    }

    .typing-area {
      position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
      z-index:100; display:flex; align-items:center; gap:10px;
    }

    #textInput {
      background:rgba(255,255,255,0.05);
      border:0.5px solid rgba(255,255,255,0.15);
      border-radius:30px; padding:13px 28px;
      font-size:1.05em; font-family:'Courier New',monospace;
      letter-spacing:0.08em; color:rgba(255,255,255,0.75);
      width:360px; text-align:center;
      backdrop-filter:blur(12px);
      transition:all 0.3s; outline:none;
    }
    #textInput:focus {
      border-color:rgba(255,255,255,0.32);
      background:rgba(255,255,255,0.08);
      box-shadow:0 0 28px rgba(255,255,255,0.07);
    }
    #textInput::placeholder { color:rgba(255,255,255,0.28); }

    /* Mode button + tooltip */
    .mode-wrap { position:relative; }

    #modeBtn {
      height:44px; padding:0 18px;
      background:rgba(255,255,255,0.07);
      border:0.5px solid rgba(255,255,255,0.15);
      color:rgba(255,255,255,0.55);
      font-family:'Courier New',monospace; font-size:10px;
      letter-spacing:0.2em; border-radius:22px;
      cursor:pointer; white-space:nowrap;
      transition:background 0.2s, color 0.2s;
      backdrop-filter:blur(12px);
    }
    #modeBtn:hover {
      background:rgba(255,255,255,0.13);
      color:rgba(255,255,255,0.88);
    }

    #tooltip {
      position:absolute; bottom:56px; right:0;
      background:rgba(10,10,18,0.97);
      border:0.5px solid rgba(255,255,255,0.12);
      border-radius:8px; padding:10px 12px;
      width:172px; pointer-events:none;
      opacity:0; transition:opacity 0.15s;
      font-family:'Courier New',monospace;
    }
    .tip-label {
      font-size:8px; letter-spacing:0.2em;
      color:rgba(255,255,255,0.28); margin-bottom:8px;
      text-transform:uppercase;
    }
    .tip-item {
      font-size:10px; color:rgba(255,255,255,0.32);
      padding:4px 0 4px 10px; margin-bottom:2px;
      transition:color 0.15s, border 0.15s;
    }
    .tip-item.active {
      color:rgba(255,255,255,0.88);
      border-left:2px solid;
      padding-left:8px;
    }
    .tip-arrow {
      position:absolute; bottom:-5px; right:18px;
      width:8px; height:8px;
      background:rgba(10,10,18,0.97);
      border-right:0.5px solid rgba(255,255,255,0.12);
      border-bottom:0.5px solid rgba(255,255,255,0.12);
      transform:rotate(45deg);
    }

    /* DOM floating letter animation */
    .letter-display {
      position:fixed; font-size:2.6em; font-weight:300;
      font-family:Georgia, serif; pointer-events:none;
      animation:floatUp 3.6s ease-out forwards;
      text-shadow:0 0 22px currentColor; z-index:50;
      transform-origin:center center;
    }
    @keyframes floatUp {
      0%   { opacity:0;   transform:scale(0)    translateY(0); }
      12%  { opacity:1;   transform:scale(1.18) translateY(-14px); }
      28%  { opacity:0.9; transform:scale(1)    translateY(-28px); }
      100% { opacity:0;   transform:scale(0.72) translateY(-115px); }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="instructions">Type or click anywhere — colors, notes &amp; visuals</div>

  <div class="typing-area">
    <input type="text" id="textInput" placeholder="type anything…" autofocus autocomplete="off">
    <div class="mode-wrap" id="modeWrap">
      <button id="modeBtn">RINGS</button>
      <div id="tooltip">
        <div class="tip-label">Visualisation</div>
        <div class="tip-item active" id="t0">Rings — expanding halos</div>
        <div class="tip-item" id="t1">Shards — sharp fragments</div>
        <div class="tip-item" id="t2">Nebula — drifting clouds</div>
        <div class="tip-item" id="t3">Pulse — flood waves</div>
        <div class="tip-arrow"></div>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const canvas   = document.getElementById('canvas');
    const ctx      = canvas.getContext('2d');
    const textInput = document.getElementById('textInput');
    const modeBtn  = document.getElementById('modeBtn');
    const tooltip  = document.getElementById('tooltip');
    const modeWrap = document.getElementById('modeWrap');
    const tipItems = ['t0','t1','t2','t3'].map(id => document.getElementById(id));

    let W = window.innerWidth, H = window.innerHeight;
    canvas.width = W; canvas.height = H;

    // ── Modes ──────────────────────────────────────────────────────────────
    const MODES       = ['RINGS','SHARDS','NEBULA','PULSE'];
    const MODE_COLORS = ['#FF2D55','#FFCC00','#448AFF','#7C4DFF'];
    let modeIdx = 0;

    // ── Chromatic scale: note → {freq, color} ──────────────────────────────
    const NOTES = [
      {freq:261.63,color:'#FF2D55'},{freq:277.18,color:'#FF6030'},
      {freq:293.66,color:'#FF9500'},{freq:311.13,color:'#FFCC00'},
      {freq:329.63,color:'#FFE840'},{freq:349.23,color:'#69F0AE'},
      {freq:369.99,color:'#00E5CC'},{freq:392.00,color:'#40E0D0'},
      {freq:415.30,color:'#29B6F6'},{freq:440.00,color:'#448AFF'},
      {freq:466.16,color:'#7C4DFF'},{freq:493.88,color:'#CE93D8'},
    ];

    // ── Per-letter accent colors for the DOM floating glyphs ───────────────
    const LETTER_COLORS = {
      a:'#ff6b6b',b:'#4ecdc4',c:'#ffe66d',d:'#6c5ce7',e:'#a8e6cf',f:'#ff8b94',
      g:'#ffd93d',h:'#6bcf7e',i:'#95e1d3',j:'#f38181',k:'#aa96da',l:'#fcbad3',
      m:'#a8d8ea',n:'#eaffd0',o:'#ff7675',p:'#fd79a8',q:'#fdcb6e',r:'#e17055',
      s:'#00b894',t:'#00cec9',u:'#a29bfe',v:'#ffeaa7',w:'#fab1a0',x:'#74b9ff',
      y:'#81ecec',z:'#dfe6e9',
    };

    // ── QWERTY key → canvas position (relative 0–1) ────────────────────────
    const KEY_POS = {
      q:{x:.06,y:.22},w:{x:.14,y:.22},e:{x:.22,y:.22},r:{x:.30,y:.22},
      t:{x:.38,y:.22},y:{x:.46,y:.22},u:{x:.54,y:.22},i:{x:.62,y:.22},
      o:{x:.70,y:.22},p:{x:.78,y:.22},
      a:{x:.09,y:.50},s:{x:.17,y:.50},d:{x:.25,y:.50},f:{x:.33,y:.50},
      g:{x:.41,y:.50},h:{x:.49,y:.50},j:{x:.57,y:.50},k:{x:.65,y:.50},
      l:{x:.73,y:.50},
      z:{x:.14,y:.78},x:{x:.22,y:.78},c:{x:.30,y:.78},v:{x:.38,y:.78},
      b:{x:.46,y:.78},n:{x:.54,y:.78},m:{x:.62,y:.78},
    };
    const LETTER_NOTE = {
      a:9,b:11,c:0,d:2,e:4,f:5,g:7,h:9,i:11,j:0,k:2,l:4,
      m:5,n:7,o:9,p:11,q:0,r:2,s:4,t:5,u:7,v:9,w:11,x:0,y:2,z:4
    };

    // ── State ──────────────────────────────────────────────────────────────
    let rings = [], particles = [], chars = [];
    let bgR=6, bgG=6, bgB=15, btR=6, btG=6, btB=15;
    let audioCtx = null;

    // ── Color helpers ──────────────────────────────────────────────────────
    const hr = h => parseInt(h.slice(1,3),16);
    const hg = h => parseInt(h.slice(3,5),16);
    const hb = h => parseInt(h.slice(5,7),16);
    const rgba = (h,a) => `rgba(${hr(h)},${hg(h)},${hb(h)},${a})`;

    // ── Audio ──────────────────────────────────────────────────────────────
    function playNote(freq, vel=0.2) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const t = audioCtx.currentTime;
        const osc  = audioCtx.createOscillator(), g  = audioCtx.createGain();
        const osc2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
        osc.type  = 'sine'; osc.frequency.value  = freq;
        osc2.type = 'sine'; osc2.frequency.value = freq * 2;
        g.gain.setValueAtTime(vel, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 1.8);
        g2.gain.setValueAtTime(vel * 0.28, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
        osc.connect(g);  osc2.connect(g2);
        g.connect(audioCtx.destination); g2.connect(audioCtx.destination);
        osc.start(t);  osc.stop(t + 1.8);
        osc2.start(t); osc2.stop(t + 1.2);
      } catch(_) {}
    }

    // ── Spawn functions ────────────────────────────────────────────────────
    function spawnRings(cx, cy, n) {
      for (let i=0; i<5; i++)
        rings.push({x:cx, y:cy, r:i*6, maxR:Math.min(W,H)*0.78+i*34,
                    color:n.color, alpha:0.82-i*0.1, speed:2.5+i*0.9, width:2.5-i*0.3});
      for (let i=0; i<64; i++) {
        if (particles.length >= 600) break;
        const angle = Math.PI*2*i/64 + (Math.random()-.5)*.35;
        const spd = 0.8 + Math.random()*4.5;
        particles.push({x:cx, y:cy, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
          color:n.color, alpha:0.9, size:Math.random()<.18?2.6+Math.random()*2.2:1+Math.random()*1.8,
          decay:0.006+Math.random()*.013, mode:'dot'});
      }
    }

    function spawnShards(cx, cy, n) {
      for (let i=0; i<28; i++) {
        if (particles.length >= 600) break;
        const angle = Math.PI*2*i/28 + (Math.random()-.5)*.2;
        const spd = 1.8 + Math.random()*6;
        particles.push({x:cx, y:cy, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
          color:n.color, alpha:0.92, len:8+Math.random()*22, angle,
          decay:0.009+Math.random()*.01, mode:'shard'});
      }
      rings.push({x:cx, y:cy, r:2, maxR:Math.min(W,H)*0.82,
                  color:n.color, alpha:0.6, speed:5, width:1});
    }

    function spawnNebula(cx, cy, n) {
      for (let i=0; i<110; i++) {
        if (particles.length >= 700) break;
        const angle = Math.random()*Math.PI*2;
        const spd = 0.1 + Math.random()*1.4;
        particles.push({
          x:cx+(Math.random()-.5)*10, y:cy+(Math.random()-.5)*10,
          vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
          color:n.color, alpha:0.5+Math.random()*.4,
          size:1.8+Math.random()*4.2, decay:0.002+Math.random()*.005, mode:'dot'});
      }
    }

    function spawnPulse(cx, cy, n) {
      for (let i=0; i<10; i++)
        rings.push({x:cx, y:cy, r:i*18, maxR:Math.max(W,H)*1.08+i*22,
                    color:n.color, alpha:0.55-i*0.04, speed:2+i*0.4, width:1.4});
    }

    // ── DOM floating glyph (from file 1) ───────────────────────────────────
    function spawnDOMletter(cx, cy, letter, color) {
      const el = document.createElement('div');
      el.className = 'letter-display';
      el.textContent = letter.toUpperCase();
      el.style.color = color;
      el.style.left = (cx - 22) + 'px';
      el.style.top  = (cy - 22) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3700);
    }

    // ── Main spawn entry-point ─────────────────────────────────────────────
    function spawnAt(cx, cy, noteIdx, vel, letter) {
      const n = NOTES[((noteIdx % 12) + 12) % 12];
      playNote(n.freq, vel || 0.2);

      // Tint background toward the note's hue
      btR = Math.max(6,  hr(n.color) * 0.09);
      btG = Math.max(6,  hg(n.color) * 0.09);
      btB = Math.max(15, hb(n.color) * 0.11);

      const m = MODES[modeIdx];
      if      (m === 'RINGS')  spawnRings (cx, cy, n);
      else if (m === 'SHARDS') spawnShards(cx, cy, n);
      else if (m === 'NEBULA') spawnNebula(cx, cy, n);
      else if (m === 'PULSE')  spawnPulse (cx, cy, n);

      if (letter) {
        const lc       = letter.toLowerCase();
        const domColor = LETTER_COLORS[lc] || n.color;
        spawnDOMletter(cx, cy, letter, domColor);
        chars.push({x:cx, y:cy, text:letter.toUpperCase(), color:domColor,
                    alpha:0.85, vy:-0.62, size:18+Math.random()*16,
                    decay:0.006+Math.random()*.006});
      }
    }

    // ── Render loop ────────────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);

      // Smooth background colour shift
      bgR += (btR - bgR) * 0.035;
      bgG += (btG - bgG) * 0.035;
      bgB += (btB - bgB) * 0.035;

      const trail = MODES[modeIdx] === 'NEBULA' ? 0.07 : 0.13;
      ctx.fillStyle = `rgba(${Math.round(bgR)},${Math.round(bgG)},${Math.round(bgB)},${trail})`;
      ctx.fillRect(0, 0, W, H);

      // Rings
      for (let i = rings.length-1; i >= 0; i--) {
        const rg = rings[i];
        rg.r += rg.speed;
        const p = rg.r / rg.maxR;
        if (p >= 1) { rings.splice(i,1); continue; }
        ctx.beginPath(); ctx.arc(rg.x, rg.y, rg.r, 0, Math.PI*2);
        ctx.strokeStyle = rgba(rg.color, rg.alpha*(1-p*p));
        ctx.lineWidth = rg.width; ctx.stroke();
      }

      // Particles (dots & shards)
      for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.978; p.vy *= 0.978;
        p.alpha -= p.decay;
        if (p.alpha <= 0.02) { particles.splice(i,1); continue; }
        if (p.mode === 'shard') {
          const ex = p.x + Math.cos(p.angle)*p.len*p.alpha;
          const ey = p.y + Math.sin(p.angle)*p.len*p.alpha;
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(ex, ey);
          ctx.strokeStyle = rgba(p.color, p.alpha); ctx.lineWidth = 1.8; ctx.stroke();
        } else {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
          ctx.fillStyle = rgba(p.color, p.alpha); ctx.fill();
        }
      }

      // Canvas ghost letters
      for (let i = chars.length-1; i >= 0; i--) {
        const c = chars[i];
        c.y += c.vy; c.vy *= 0.97; c.alpha -= c.decay;
        if (c.alpha <= 0.02) { chars.splice(i,1); continue; }
        ctx.font = `300 ${c.size}px Georgia, serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = rgba(c.color, c.alpha * 0.68);
        ctx.fillText(c.text, c.x, c.y);
      }
    }

    // ── Mode button & tooltip ──────────────────────────────────────────────
    function updateTooltip() {
      tipItems.forEach((t, i) => {
        if (i === modeIdx) {
          t.classList.add('active');
          t.style.borderLeftColor = MODE_COLORS[i];
          t.style.color = 'rgba(255,255,255,0.88)';
        } else {
          t.classList.remove('active');
          t.style.color = 'rgba(255,255,255,0.32)';
        }
      });
    }

    modeWrap.addEventListener('mouseenter', () => { tooltip.style.opacity = '1'; });
    modeWrap.addEventListener('mouseleave', () => { tooltip.style.opacity = '0'; });
    modeBtn.addEventListener('click', () => {
      modeIdx = (modeIdx + 1) % MODES.length;
      modeBtn.textContent = MODES[modeIdx];
      updateTooltip();
      rings = []; particles = []; chars = [];
      ctx.fillStyle = '#06060f'; ctx.fillRect(0, 0, W, H);
      bgR=6; bgG=6; bgB=15; btR=6; btG=6; btB=15;
    });

    // ── Text input ────────────────────────────────────────────────────────
    let lastText = '';
    textInput.addEventListener('input', e => {
      const cur = e.target.value;
      if (cur.length > lastText.length) {
        const ch = cur[cur.length-1].toLowerCase();
        const pos = KEY_POS[ch] || {x:0.5, y:0.46};
        const ni  = LETTER_NOTE[ch] !== undefined
                    ? LETTER_NOTE[ch]
                    : (ch.charCodeAt(0) % 12);
        spawnAt(pos.x * W, pos.y * H, ni, 0.2, ch);
      }
      lastText = cur;
      if (cur.length > 30) { textInput.value = ''; lastText = ''; }
    });

    // ── Direct keyboard (when input not focused) ───────────────────────────
    document.addEventListener('keydown', e => {
      if (document.activeElement === textInput) return;
      if (e.repeat || e.metaKey || e.ctrlKey) return;
      const k = e.key.toLowerCase();
      if (!/^[a-z]$/.test(k)) return;
      const pos = KEY_POS[k] || {x:0.5, y:0.5};
      spawnAt(pos.x * W, pos.y * H, LETTER_NOTE[k] ?? 0, 0.2, k);
    });

    // ── Canvas click / touch ───────────────────────────────────────────────
    function getPos(e) {
      const src = e.touches ? e.touches[0] : e;
      return {x: src.clientX, y: src.clientY};
    }
    canvas.addEventListener('mousedown', e => {
      const p = getPos(e);
      spawnAt(p.x, p.y, Math.floor((p.x/W)*NOTES.length),
              0.15 + ((H-p.y)/H)*0.22, null);
    });
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const p = getPos(e);
      spawnAt(p.x, p.y, Math.floor((p.x/W)*NOTES.length),
              0.15 + ((H-p.y)/H)*0.22, null);
    }, {passive:false});

    // ── Resize ────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W; canvas.height = H;
      ctx.fillStyle = '#06060f'; ctx.fillRect(0, 0, W, H);
    });

    // ── Init ──────────────────────────────────────────────────────────────
    ctx.fillStyle = '#06060f';
    ctx.fillRect(0, 0, W, H);
    animate();
    textInput.focus();
  })();
  </script>
</body>
</html>
